<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f; --surface: #181818; --surface2: #222; --border: #2a2a2a;
  --accent: #e8ff4a; --accent-dim: rgba(232,255,74,0.08);
  --text: #f0f0f0; --text-muted: #888; --text-dim: #444;
  --danger: #ff5555; --success: #4caf82;
  --font-mono: 'IBM Plex Mono', monospace; --font-sans: 'Space Grotesk', sans-serif;
}
body { background: var(--bg); color: var(--text); font-family: var(--font-sans); height: 100dvh; display: flex; overflow: hidden; }
.screen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }
input, textarea, button { font-family: var(--font-sans); }
.field { margin-bottom: 1rem; }
.label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; font-family: var(--font-mono); display: block; }
.inp { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.7rem 1rem; color: var(--text); font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
.inp:focus { border-color: var(--accent); }
.inp::placeholder { color: var(--text-dim); }
.btn-primary { width: 100%; padding: 0.8rem; background: var(--accent); color: #0f0f0f; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
.btn-primary:hover { opacity: 0.88; }
.btn-primary:active { transform: scale(0.98); }
.btn-ghost { width: 100%; padding: 0.65rem; background: none; color: var(--text-muted); border: 1px solid var(--border); border-radius: 10px; font-size: 0.85rem; cursor: pointer; transition: color 0.15s; margin-top: 0.5rem; }
.btn-ghost:hover { color: var(--text); }
.err { font-size: 0.78rem; color: var(--danger); margin-top: 0.4rem; min-height: 1rem; }
@keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
@keyframes msgIn   { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
#auth-screen { align-items: center; justify-content: center; padding: 2rem; }
.auth-card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem 2rem; animation: slideUp 0.35s ease; }
.auth-logo { font-family: var(--font-mono); font-size: 1.5rem; color: var(--accent); margin-bottom: 0.25rem; }
.auth-sub  { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1.75rem; font-weight: 300; }
.auth-toggle { text-align: center; font-size: 0.82rem; color: var(--text-muted); margin-top: 1.25rem; }
.auth-toggle a { color: var(--accent); cursor: pointer; }
#chat-screen { flex-direction: row; }
.sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sidebar-logo { font-family: var(--font-mono); font-size: 1rem; color: var(--accent); }
.sidebar-actions { display: flex; gap: 6px; }
.icon-btn { width: 30px; height: 30px; background: none; border: 1px solid var(--border); border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all 0.15s; }
.icon-btn:hover { color: var(--text); border-color: #555; background: var(--surface2); }
.icon-btn svg { width: 13px; height: 13px; }
.channel-section { padding: 0.5rem 0; flex: 1; overflow-y: auto; }
.channel-section::-webkit-scrollbar { width: 3px; }
.channel-section::-webkit-scrollbar-thumb { background: var(--border); }
.section-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--font-mono); padding: 0.5rem 1rem 0.25rem; }
.channel-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.45rem 1rem; cursor: pointer; transition: background 0.15s; font-size: 0.85rem; color: var(--text-muted); position: relative; }
.channel-item:hover { background: var(--surface2); color: var(--text); }
.channel-item.active { background: var(--accent-dim); color: var(--accent); }
.channel-hash { font-family: var(--font-mono); font-size: 0.9rem; flex-shrink: 0; }
.channel-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.sidebar-footer { border-top: 1px solid var(--border); padding: 0.75rem 1rem; display: flex; align-items: center; gap: 0.6rem; }
.sidebar-avatar { width: 32px; height: 32px; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; font-family: var(--font-mono); flex-shrink: 0; cursor: pointer; border: 1.5px solid var(--border); transition: border-color 0.2s; }
.sidebar-avatar:hover { border-color: var(--accent); }
.sidebar-avatar img { width: 100%; height: 100%; object-fit: cover; }
.sidebar-user { flex: 1; min-width: 0; }
.sidebar-display { font-size: 0.82rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-handle { font-size: 0.68rem; color: var(--text-muted); font-family: var(--font-mono); }
.sidebar-footer-actions { display: flex; gap: 4px; }
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.chat-header { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.chat-header-left { display: flex; align-items: center; gap: 0.6rem; }
.chat-channel-name { font-weight: 500; font-size: 0.95rem; }
.chat-channel-hash { font-family: var(--font-mono); color: var(--text-muted); }
.online-pill { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: var(--text-muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; }
.online-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.35} }
.admin-badge { font-size: 0.65rem; font-family: var(--font-mono); color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(232,255,74,0.2); border-radius: 4px; padding: 2px 6px; }
#messages { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.35rem; scroll-behavior: smooth; }
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.day-divider { text-align: center; font-size: 0.68rem; color: var(--text-dim); font-family: var(--font-mono); margin: 0.5rem 0; display: flex; align-items: center; gap: 0.75rem; }
.day-divider::before, .day-divider::after { content:''; flex:1; height:1px; background: var(--border); }
.msg { display: flex; gap: 0.6rem; align-items: flex-start; animation: msgIn 0.2s ease; max-width: 78%; position: relative; }
.msg:hover .msg-actions { opacity: 1; }
.msg.own { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; margin-top: 2px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 600; font-family: var(--font-mono); cursor: pointer; }
.msg-avatar img { width:100%; height:100%; object-fit:cover; }
.msg-body { display: flex; flex-direction: column; gap: 2px; }
.msg.own .msg-body { align-items: flex-end; }
.msg-meta { font-size: 0.68rem; color: var(--text-dim); font-family: var(--font-mono); display: flex; align-items: center; gap: 6px; }
.msg-display { font-size: 0.75rem; }
.msg-bubble { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.5rem 0.75rem; font-size: 0.88rem; line-height: 1.55; word-break: break-word; color: var(--text); }
.msg.own .msg-bubble { background: var(--accent-dim); border-color: rgba(232,255,74,0.15); }
.msg-bubble a { color: var(--accent); text-decoration: none; }
.msg-bubble a:hover { text-decoration: underline; }
.msg-img { max-width: 100%; max-height: 300px; border-radius: 8px; display: block; cursor: zoom-in; border: 1px solid var(--border); margin-top: 2px; }
.msg-actions { opacity: 0; position: absolute; top: -4px; right: 0; display: flex; gap: 3px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 3px; transition: opacity 0.15s; z-index: 10; }
.msg.own .msg-actions { right: auto; left: 0; }
.msg-action-btn { width: 22px; height: 22px; background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); border-radius: 4px; transition: all 0.15s; }
.msg-action-btn:hover { background: rgba(255,85,85,0.1); color: var(--danger); }
.msg-action-btn svg { width: 12px; height: 12px; }
.system-msg { text-align: center; font-size: 0.72rem; color: var(--text-dim); font-family: var(--font-mono); margin: 0.25rem 0; }
.chat-footer { padding: 0.75rem 1.25rem 1rem; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.paste-preview { position: relative; margin-bottom: 0.5rem; display: none; }
.paste-preview img { max-height: 120px; border-radius: 8px; border: 1px solid var(--border); }
.paste-preview-remove { position: absolute; top: 4px; left: 4px; width: 20px; height: 20px; background: rgba(0,0,0,0.7); border: none; border-radius: 50%; color: #fff; cursor: pointer; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
.input-row { display: flex; gap: 0.6rem; align-items: flex-end; }
#msg-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.65rem 1rem; color: var(--text); font-size: 0.88rem; resize: none; outline: none; max-height: 120px; min-height: 40px; line-height: 1.45; transition: border-color 0.2s; }
#msg-input:focus { border-color: rgba(232,255,74,0.35); }
#msg-input::placeholder { color: var(--text-dim); }
.input-btn { width: 40px; height: 40px; border: 1px solid var(--border); background: var(--surface2); border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; color: var(--text-muted); }
.input-btn:hover { border-color: #555; color: var(--text); }
.input-btn svg { width: 15px; height: 15px; }
.send-btn { background: var(--accent); border-color: var(--accent); color: #0f0f0f; }
.send-btn:hover { opacity: 0.85; }
.send-btn:active { transform: scale(0.95); }
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1.5rem; animation: fadeIn 0.2s ease; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; width: 100%; max-width: 420px; max-height: 90dvh; overflow-y: auto; animation: slideUp 0.25s ease; }
.modal-title { font-family: var(--font-mono); font-size: 0.95rem; color: var(--accent); margin-bottom: 1.5rem; }
.modal-close { float: right; background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; }
.modal-close:hover { color: var(--text); }
.avatar-upload-wrap { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
.avatar-preview { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface2); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-family: var(--font-mono); font-weight: 600; flex-shrink: 0; }
.avatar-preview img { width:100%; height:100%; object-fit:cover; }
.avatar-upload-btn { padding: 0.5rem 1rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; font-size: 0.8rem; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
.avatar-upload-btn:hover { color: var(--text); border-color: #555; }
.user-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
.user-row:last-child { border-bottom: none; }
.user-row-info { flex: 1; min-width: 0; }
.user-row-name { font-size: 0.88rem; font-weight: 500; }
.user-row-handle { font-size: 0.72rem; color: var(--text-muted); font-family: var(--font-mono); }
.user-row-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
.btn-sm { padding: 4px 10px; border-radius: 6px; font-size: 0.72rem; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted); transition: all 0.15s; }
.btn-sm:hover { color: var(--text); border-color: #555; }
.btn-sm.danger { border-color: rgba(255,85,85,0.3); color: var(--danger); }
.btn-sm.danger:hover { background: rgba(255,85,85,0.1); }
.btn-sm.success { border-color: rgba(76,175,130,0.3); color: var(--success); }
.btn-sm.success:hover { background: rgba(76,175,130,0.1); }
.banned-tag { font-size: 0.65rem; color: var(--danger); font-family: var(--font-mono); background: rgba(255,85,85,0.1); border: 1px solid rgba(255,85,85,0.2); border-radius: 4px; padding: 1px 5px; }
#lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 300; cursor: zoom-out; }
#lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px; }
.profile-big-avatar { width: 72px; height: 72px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface2); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-family: var(--font-mono); font-weight: 600; flex-shrink: 0; }
.profile-big-avatar img { width:100%; height:100%; object-fit:cover; }
.mobile-sidebar-toggle { display: none; }
@media (max-width: 640px) {
  .sidebar { position: fixed; inset: 0; z-index: 100; width: 100%; transform: translateX(-100%); transition: transform 0.25s ease; }
  .sidebar.open { transform: translateX(0); }
  .mobile-sidebar-toggle { display: flex; }
  .msg { max-width: 88%; }
}
#titulo112 {
  font-family: "DM Mono";
}
</style>
</head>
<body>

<div id="auth-screen" class="screen active">
  <div class="auth-card">
    <div class="auth-logo" id="titulo112">// Chat Cuppimxas</div>
    <div class="auth-sub" id="auth-sub">crie sua conta</div>
    <div id="register-fields">
      <div class="field"><div class="label">display name</div><input class="inp" id="reg-display" type="text" placeholder="ex: Lucas Silva" maxlength="30" autocomplete="off"></div>
    </div>
    <div class="field"><div class="label">@ usuário</div><input class="inp" id="auth-user" type="text" placeholder="ex: lucas" maxlength="20" autocomplete="off"></div>
    <div class="field"><div class="label">senha</div><input class="inp" id="auth-pass" type="password" placeholder="••••••••" maxlength="64"></div>
    <div id="auth-err" class="err"></div>
    <button class="btn-primary" id="auth-btn" onclick="submitAuth()">Criar conta</button>
    <div class="auth-toggle"><span id="auth-toggle-text">Já tem conta?</span> <a onclick="toggleAuthMode()"><span id="auth-toggle-link">Entrar</span></a></div>
  </div>
</div>

<div id="chat-screen" class="screen">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">// chat</div>
      <div class="sidebar-actions">
        <button class="icon-btn" onclick="openCreateGroup()" title="Novo grupo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>
    <div class="channel-section">
      <div class="section-label">canais</div>
      <div class="channel-item active" data-channel="geral" onclick="switchChannel('geral',this);document.getElementById('sidebar').classList.remove('open')">
        <span class="channel-hash">#</span><span class="channel-name">geral</span>
      </div>
      <div id="group-list"></div>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-avatar" id="sidebar-avatar" onclick="openProfile()"></div>
      <div class="sidebar-user">
        <div class="sidebar-display" id="sidebar-display"></div>
        <div class="sidebar-handle" id="sidebar-handle"></div>
      </div>
      <div class="sidebar-footer-actions">
        <button class="icon-btn" id="admin-btn" style="display:none" onclick="openAdmin()" title="Admin">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-header">
      <div class="chat-header-left">
        <button class="icon-btn mobile-sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="chat-channel-hash">#</span>
        <span class="chat-channel-name" id="chat-channel-name">geral</span>
        <span class="admin-badge" id="admin-badge" style="display:none">admin</span>
      </div>
      <div class="online-pill"><div class="online-dot"></div><span id="online-count">0 online</span></div>
    </div>
    <div id="messages"></div>
    <div class="chat-footer">
      <div class="paste-preview" id="paste-preview">
        <button class="paste-preview-remove" onclick="clearPasteImage()">✕</button>
        <img id="paste-preview-img" src="" alt="">
      </div>
      <div class="input-row">
        <button class="input-btn" onclick="document.getElementById('img-upload').click()" title="Enviar imagem">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <input type="file" id="img-upload" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
        <textarea id="msg-input" rows="1" placeholder="mensagem... (ctrl+v para colar imagem)"></textarea>
        <button class="input-btn send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modals -->
<div id="profile-modal" class="modal-backdrop" style="display:none" onclick="closeOnBackdrop(event,'profile-modal')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('profile-modal')">✕</button>
    <div class="modal-title">// meu perfil</div>
    <div class="avatar-upload-wrap">
      <div class="avatar-preview" id="profile-preview"></div>
      <div>
        <button class="avatar-upload-btn" onclick="document.getElementById('avatar-file').click()">Trocar foto</button>
        <input type="file" id="avatar-file" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)">
        <div style="font-size:0.72rem;color:var(--text-dim);margin-top:4px">máx 300KB</div>
      </div>
    </div>
    <div class="field"><div class="label">display name</div><input class="inp" id="profile-display" type="text" maxlength="30"></div>
    <div class="field"><div class="label">@ usuário</div><input class="inp" id="profile-user" disabled style="opacity:0.5;cursor:not-allowed"></div>
    <div class="field"><div class="label">nova senha (vazio = manter)</div><input class="inp" id="profile-pass" type="password" placeholder="••••••••" maxlength="64"></div>
    <div id="profile-err" class="err"></div>
    <button class="btn-primary" onclick="saveProfile()">Salvar</button>
    <button class="btn-ghost" onclick="doLogout()">Sair da conta</button>
  </div>
</div>

<div id="view-modal" class="modal-backdrop" style="display:none" onclick="closeOnBackdrop(event,'view-modal')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('view-modal')">✕</button>
    <div class="modal-title">// perfil</div>
    <div style="display:flex;align-items:center;gap:1rem">
      <div class="profile-big-avatar" id="view-avatar"></div>
      <div>
        <div id="view-display" style="font-size:1rem;font-weight:500"></div>
        <div id="view-handle" style="font-size:0.78rem;color:var(--text-muted);font-family:var(--font-mono)"></div>
      </div>
    </div>
  </div>
</div>

<div id="group-modal" class="modal-backdrop" style="display:none" onclick="closeOnBackdrop(event,'group-modal')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('group-modal')">✕</button>
    <div class="modal-title">// criar grupo</div>
    <div class="field"><div class="label">nome do grupo</div><input class="inp" id="group-name-inp" type="text" placeholder="ex: turma-a" maxlength="30" autocomplete="off"></div>
    <div id="group-err" class="err"></div>
    <button class="btn-primary" onclick="createGroup()">Criar</button>
  </div>
</div>

<div id="admin-modal" class="modal-backdrop" style="display:none" onclick="closeOnBackdrop(event,'admin-modal')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('admin-modal')">✕</button>
    <div class="modal-title">// painel admin</div>
    <div id="admin-user-list"></div>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src="" alt=""></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, serverTimestamp, onDisconnect, set, remove, get, update } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAAM0MjDIzkWGGBwf9jZothOYRgV5rs4AQ",
  authDomain: "chat-cupimxas.firebaseapp.com",
  databaseURL: "https://chat-cupimxas-default-rtdb.firebaseio.com",
  projectId: "chat-cupimxas",
  storageBucket: "chat-cupimxas.firebasestorage.app",
  messagingSenderId: "464237186263",
  appId: "1:464237186263:web:43c1ba11d602424c3ab492"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ADMIN_USER = 'mano.botkk';
const COLORS = ['#e8ff4a','#4affe8','#ff4aaa','#4a88ff','#ff884a','#aa4aff','#4aff88'];

async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function getColor(n){let h=0;for(let c of(n||''))h=(h*31+c.charCodeAt(0))%COLORS.length;return COLORS[h];}
function initials(n){return(n||'?').slice(0,2).toUpperCase();}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function linkify(h){return h.replace(/(https?:\/\/[^\s<"]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');}

function renderAvatar(el, user) {
  if (user && user.avatar) {
    el.innerHTML = `<img src="${user.avatar}" alt="">`;
    el.style.background = el.style.color = '';
  } else {
    const color = getColor((user&&(user.username||user.display))||'?');
    el.innerHTML = initials((user&&(user.display||user.username))||'?');
    el.style.background = color+'22';
    el.style.color = color;
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let currentUser = null, presenceRef = null, isLoginMode = false;
let allUsers = {}, currentChannel = 'geral', msgListener = null;
let pendingAvatar = null, pendingImage = null;

window.toggleAuthMode = function() {
  isLoginMode = !isLoginMode;
  document.getElementById('register-fields').style.display = isLoginMode?'none':'';
  document.getElementById('auth-sub').textContent = isLoginMode?'bem-vindo de volta':'crie sua conta';
  document.getElementById('auth-btn').textContent = isLoginMode?'Entrar':'Criar conta';
  document.getElementById('auth-toggle-text').textContent = isLoginMode?'Não tem conta?':'Já tem conta?';
  document.getElementById('auth-toggle-link').textContent = isLoginMode?'Cadastrar':'Entrar';
  document.getElementById('auth-err').textContent = '';
};

window.submitAuth = async function() {
  const username = document.getElementById('auth-user').value.trim().toLowerCase();
  const pass = document.getElementById('auth-pass').value;
  const display = document.getElementById('reg-display').value.trim();
  const err = document.getElementById('auth-err');
  err.textContent = '';
  if(!username){err.textContent='Digite um @ usuário.';return;}
  if(!/^[a-z0-9_.\-]+$/.test(username)){err.textContent='Use letras minúsculas, números, _ . -';return;}
  if(username.length<2){err.textContent='Mínimo 2 caracteres.';return;}
  if(!pass||pass.length<4){err.textContent='Senha mínima: 4 caracteres.';return;}
  if(!isLoginMode&&!display){err.textContent='Digite seu nome de exibição.';return;}
  const passHash = await sha256(pass);
  const snap = await get(ref(db,`users/${username}`));
  if(isLoginMode){
    if(!snap.exists()){err.textContent='Usuário não encontrado.';return;}
    const d=snap.val();
    if(d.passHash!==passHash){err.textContent='Senha incorreta.';return;}
    if(d.banned){err.textContent='Sua conta foi banida.';return;}
    currentUser={username,display:d.display,avatar:d.avatar||null,isAdmin:username===ADMIN_USER};
  } else {
    if(snap.exists()){err.textContent='Esse @ já está em uso.';return;}
    await set(ref(db,`users/${username}`),{username,display,passHash,avatar:null,banned:false,createdAt:Date.now()});
    currentUser={username,display,avatar:null,isAdmin:username===ADMIN_USER};
  }
  sessionStorage.setItem('chat_session',JSON.stringify({username,passHash}));
  startChat();
};

(async()=>{
  const saved=sessionStorage.getItem('chat_session');
  if(!saved)return;
  try{
    const{username,passHash}=JSON.parse(saved);
    const snap=await get(ref(db,`users/${username}`));
    if(snap.exists()&&snap.val().passHash===passHash&&!snap.val().banned){
      const d=snap.val();
      currentUser={username,display:d.display,avatar:d.avatar||null,isAdmin:username===ADMIN_USER};
      startChat();return;
    }
  }catch(e){}
  sessionStorage.removeItem('chat_session');
})();

function startChat(){
  showScreen('chat-screen');
  updateSidebarUser();
  if(currentUser.isAdmin){document.getElementById('admin-badge').style.display='';document.getElementById('admin-btn').style.display='';}
  presenceRef=ref(db,`presence/${currentUser.username}`);
  set(presenceRef,{display:currentUser.display,ts:Date.now()});
  onDisconnect(presenceRef).remove();
  onValue(ref(db,'presence'),snap=>{document.getElementById('online-count').textContent=(snap.exists()?Object.keys(snap.val()).length:0)+' online';});
  onValue(ref(db,'users'),snap=>{if(snap.exists())allUsers=snap.val();});
  onValue(ref(db,'groups'),snap=>{renderGroupList(snap.exists()?snap.val():{});});
  switchChannel('geral');
  const inp=document.getElementById('msg-input');
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
  inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,120)+'px';});
  inp.addEventListener('paste',handlePaste);
  setTimeout(()=>inp.focus(),100);
}

function updateSidebarUser(){
  renderAvatar(document.getElementById('sidebar-avatar'),currentUser);
  document.getElementById('sidebar-display').textContent=currentUser.display;
  document.getElementById('sidebar-handle').textContent='@'+currentUser.username;
}

function renderGroupList(groups){
  const list=document.getElementById('group-list');
  list.innerHTML='';
  Object.entries(groups).forEach(([key,g])=>{
    const item=document.createElement('div');
    item.className='channel-item'+(currentChannel===key?' active':'');
    item.dataset.channel=key;
    item.onclick=()=>{switchChannel(key,item);document.getElementById('sidebar').classList.remove('open');};
    item.innerHTML=`<span class="channel-hash">#</span><span class="channel-name">${escHtml(g.name)}</span>`;
    list.appendChild(item);
  });
}

window.openCreateGroup=function(){
  document.getElementById('group-name-inp').value='';
  document.getElementById('group-err').textContent='';
  document.getElementById('group-modal').style.display='flex';
};

window.createGroup=async function(){
  const name=document.getElementById('group-name-inp').value.trim().toLowerCase().replace(/\s+/g,'-');
  const err=document.getElementById('group-err');
  err.textContent='';
  if(!name||name.length<2){err.textContent='Nome muito curto.';return;}
  if(!/^[a-z0-9\-_]+$/.test(name)){err.textContent='Use letras, números, - e _';return;}
  if(name==='geral'){err.textContent='Esse nome é reservado.';return;}
  const snap=await get(ref(db,`groups/${name}`));
  if(snap.exists()){err.textContent='Grupo já existe.';return;}
  await set(ref(db,`groups/${name}`),{name,createdBy:currentUser.username,createdAt:Date.now()});
  closeModal('group-modal');
  switchChannel(name);
};

function switchChannel(channelId,el){
  currentChannel=channelId;
  document.getElementById('chat-channel-name').textContent=channelId;
  document.querySelectorAll('.channel-item').forEach(i=>i.classList.remove('active'));
  if(el)el.classList.add('active');
  else document.querySelectorAll('.channel-item').forEach(i=>{if(i.dataset.channel===channelId)i.classList.add('active');});
  loadMessages(channelId);
}
window.switchChannel=switchChannel;

function loadMessages(channelId){
  if(msgListener)msgListener();
  document.getElementById('messages').innerHTML='';
  let lastDay='';
  msgListener=onValue(ref(db,`messages/${channelId}`),snap=>{
    const container=document.getElementById('messages');
    const wasBottom=container.scrollHeight-container.scrollTop-container.clientHeight<80;
    container.innerHTML='';lastDay='';
    if(!snap.exists())return;
    const all=Object.entries(snap.val()).map(([k,v])=>({...v,_key:k})).sort((a,b)=>(a.ts||0)-(b.ts||0));
    all.forEach(m=>{lastDay=appendMessage(m,lastDay,channelId);});
    if(wasBottom||all.length<2)container.scrollTop=container.scrollHeight;
  });
}

function appendMessage(m,lastDay,channelId){
  const container=document.getElementById('messages');
  if(m.system){const d=document.createElement('div');d.className='system-msg';d.textContent=m.text;container.appendChild(d);return lastDay;}
  const ts=m.ts||Date.now();
  const dayStr=new Date(ts).toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  if(dayStr!==lastDay){const d=document.createElement('div');d.className='day-divider';d.textContent=dayStr;container.appendChild(d);lastDay=dayStr;}
  const isOwn=m.user===currentUser.username;
  const sender=allUsers[m.user]||{username:m.user,display:m.display||m.user};
  const color=getColor(m.user);
  const wrap=document.createElement('div');
  wrap.className='msg'+(isOwn?' own':'');
  wrap.dataset.key=m._key;
  const avatarEl=document.createElement('div');
  avatarEl.className='msg-avatar';
  renderAvatar(avatarEl,sender);
  avatarEl.onclick=()=>viewProfile(m.user);
  const body=document.createElement('div');
  body.className='msg-body';
  const meta=document.createElement('div');
  meta.className='msg-meta';
  if(!isOwn)meta.innerHTML=`<span class="msg-display" style="color:${color}">${escHtml(sender.display||m.user)}</span>`;
  meta.innerHTML+=`<span>${fmtTime(ts)}</span>`;
  const bubble=document.createElement('div');
  bubble.className='msg-bubble';
  if(m.image){
    const img=document.createElement('img');
    img.className='msg-img';img.src=m.image;img.alt='imagem';
    img.onclick=()=>openLightbox(m.image);
    bubble.appendChild(img);
    if(m.text){const t=document.createElement('div');t.innerHTML=linkify(escHtml(m.text));t.style.marginTop='4px';bubble.appendChild(t);}
  } else {
    bubble.innerHTML=linkify(escHtml(m.text||''));
  }
  if(isOwn||currentUser.isAdmin){
    const actions=document.createElement('div');
    actions.className='msg-actions';
    const delBtn=document.createElement('button');
    delBtn.className='msg-action-btn';
    delBtn.title='Apagar';
    delBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
    delBtn.onclick=e=>{e.stopPropagation();deleteMessage(m._key,channelId);};
    actions.appendChild(delBtn);
    wrap.appendChild(actions);
  }
  body.appendChild(meta);body.appendChild(bubble);
  wrap.appendChild(avatarEl);wrap.appendChild(body);
  container.appendChild(wrap);
  return lastDay;
}

function deleteMessage(key,channelId){
  if(!confirm('Apagar mensagem?'))return;
  remove(ref(db,`messages/${channelId}/${key}`));
}

window.sendMessage=async function(){
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim();
  if(!text&&!pendingImage)return;
  const payload={user:currentUser.username,display:currentUser.display,ts:serverTimestamp()};
  if(pendingImage)payload.image=pendingImage;
  if(text)payload.text=text;
  inp.value='';inp.style.height='auto';
  clearPasteImage();
  await push(ref(db,`messages/${currentChannel}`),payload);
  setTimeout(()=>{const c=document.getElementById('messages');c.scrollTop=c.scrollHeight;},80);
};

function compressImage(file,cb){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      let w=img.width,h=img.height;
      const max=1200;
      if(w>max||h>max){const s=Math.min(max/w,max/h);w=Math.round(w*s);h=Math.round(h*s);}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg',0.78));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

window.handleImageUpload=function(e){
  const file=e.target.files[0];if(!file)return;
  compressImage(file,data=>setPendingImage(data));
  e.target.value='';
};

function handlePaste(e){
  const items=e.clipboardData&&e.clipboardData.items;
  if(!items)return;
  for(let item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      compressImage(item.getAsFile(),data=>setPendingImage(data));
      break;
    }
  }
}

function setPendingImage(data){
  pendingImage=data;
  document.getElementById('paste-preview').style.display='';
  document.getElementById('paste-preview-img').src=data;
}

window.clearPasteImage=function(){
  pendingImage=null;
  document.getElementById('paste-preview').style.display='none';
  document.getElementById('paste-preview-img').src='';
};

window.openLightbox=function(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').style.display='flex';};
window.closeLightbox=function(){document.getElementById('lightbox').style.display='none';};

window.openProfile=function(){
  document.getElementById('profile-display').value=currentUser.display;
  document.getElementById('profile-user').value='@'+currentUser.username;
  document.getElementById('profile-pass').value='';
  document.getElementById('profile-err').textContent='';
  renderAvatar(document.getElementById('profile-preview'),currentUser);
  pendingAvatar=null;
  document.getElementById('profile-modal').style.display='flex';
};

window.handleAvatarUpload=function(e){
  const file=e.target.files[0];if(!file)return;
  if(file.size>300*1024){document.getElementById('profile-err').textContent='Máx 300KB.';return;}
  const reader=new FileReader();
  reader.onload=ev=>{pendingAvatar=ev.target.result;const p=document.getElementById('profile-preview');p.innerHTML=`<img src="${pendingAvatar}" alt="">`;};
  reader.readAsDataURL(file);
};

window.saveProfile=async function(){
  const display=document.getElementById('profile-display').value.trim();
  const pass=document.getElementById('profile-pass').value;
  const err=document.getElementById('profile-err');
  err.textContent='';
  if(!display){err.textContent='Display name não pode ser vazio.';return;}
  const updates={display};
  if(pendingAvatar)updates.avatar=pendingAvatar;
  if(pass){if(pass.length<4){err.textContent='Mínimo 4 caracteres.';return;}updates.passHash=await sha256(pass);}
  await update(ref(db,`users/${currentUser.username}`),updates);
  currentUser.display=display;
  if(pendingAvatar){currentUser.avatar=pendingAvatar;pendingAvatar=null;}
  updateSidebarUser();
  closeModal('profile-modal');
};

window.doLogout=function(){
  if(presenceRef)remove(presenceRef);
  sessionStorage.removeItem('chat_session');
  currentUser=null;
  if(msgListener){msgListener();msgListener=null;}
  closeModal('profile-modal');
  document.getElementById('admin-badge').style.display='none';
  document.getElementById('admin-btn').style.display='none';
  document.getElementById('messages').innerHTML='';
  document.getElementById('group-list').innerHTML='';
  document.getElementById('auth-user').value='';
  document.getElementById('auth-pass').value='';
  document.getElementById('auth-err').textContent='';
  showScreen('auth-screen');
};

window.viewProfile=function(username){
  const user=allUsers[username]||{username,display:username};
  document.getElementById('view-display').textContent=user.display||username;
  document.getElementById('view-handle').textContent='@'+username;
  renderAvatar(document.getElementById('view-avatar'),user);
  document.getElementById('view-modal').style.display='flex';
};

window.openAdmin=function(){
  if(!currentUser.isAdmin)return;
  document.getElementById('admin-modal').style.display='flex';
  renderAdminList();
};

function renderAdminList(){
  const list=document.getElementById('admin-user-list');
  list.innerHTML='';
  const users=Object.values(allUsers).filter(u=>u.username!==ADMIN_USER);
  if(!users.length){list.innerHTML='<div style="color:var(--text-muted);font-size:0.85rem">Nenhum usuário.</div>';return;}
  users.forEach(u=>{
    const row=document.createElement('div');row.className='user-row';
    const av=document.createElement('div');
    av.style.cssText='width:34px;height:34px;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:600;font-family:var(--font-mono);flex-shrink:0';
    renderAvatar(av,u);
    const info=document.createElement('div');info.className='user-row-info';
    info.innerHTML=`<div class="user-row-name">${escHtml(u.display||u.username)} ${u.banned?'<span class="banned-tag">banido</span>':''}</div><div class="user-row-handle">@${u.username}</div>`;
    const actions=document.createElement('div');actions.className='user-row-actions';
    const editBtn=document.createElement('button');editBtn.className='btn-sm';editBtn.textContent='editar';editBtn.onclick=()=>adminEditUser(u.username);
    const banBtn=document.createElement('button');banBtn.className=u.banned?'btn-sm success':'btn-sm danger';banBtn.textContent=u.banned?'desbanir':'banir';banBtn.onclick=()=>adminToggleBan(u.username,u.banned);
    actions.appendChild(editBtn);actions.appendChild(banBtn);
    row.appendChild(av);row.appendChild(info);row.appendChild(actions);
    list.appendChild(row);
  });
}

window.adminToggleBan=async function(username,isBanned){
  await update(ref(db,`users/${username}`),{banned:!isBanned});
  if(!isBanned){push(ref(db,`messages/${currentChannel}`),{system:true,text:`@${username} foi banido.`,ts:serverTimestamp()});remove(ref(db,`presence/${username}`));}
  renderAdminList();
};

window.adminEditUser=async function(username){
  const user=allUsers[username];if(!user)return;
  const newDisplay=prompt(`Novo display name para @${username}:`,user.display||username);
  if(newDisplay&&newDisplay.trim())await update(ref(db,`users/${username}`),{display:newDisplay.trim()});
  renderAdminList();
};

window.closeModal=id=>{document.getElementById(id).style.display='none';};
window.closeOnBackdrop=(e,id)=>{if(e.target.id===id)closeModal(id);};
</script>
</body>
</html>
